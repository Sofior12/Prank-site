<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Device Scan</title>

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  text-align: center;
  padding-top: 100px;
}

#progress {
  width: 80%;
  margin: 20px auto;
  background: #111;
  border: 1px solid lime;
}

#bar {
  width: 0%;
  height: 20px;
  background: lime;
}

h1 {
  font-size: 28px;
}

</style>
</head>

<body>

<h1>🔍 Device Scan Starting...</h1>
<p id="status">Initializing...</p>

<div id="progress">
  <div id="bar"></div>
</div>

<script>
let width = 0;
let bar = document.getElementById("bar");
let status = document.getElementById("status");

let steps = [
  "Initializing...",
  "Connecting to server...",
  "Scanning device...",
  "Accessing files...",
  "Uploading data...",
  "Finalizing..."
];

let i = 0;

let interval = setInterval(() => {
  if (width >= 100) {
    clearInterval(interval);
    status.innerHTML = "Scan Complete ✅";

    setTimeout(() => {
      document.body.innerHTML = `
        <h1 style="color:red;">⚠️ Device Hacked!</h1>
        <p>All data has been copied 😈</p>
        <p>Just kidding 😂 (April Fool)</p>
      `;
    }, 1500);

  } else {
    width++;
    bar.style.width = width + "%";

    if (width % 15 === 0 && i < steps.length) {
      status.innerHTML = steps[i];
      i++;
    }
  }
}, 80);
</script>

</body>
</html>
