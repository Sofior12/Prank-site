<!DOCTYPE html>
<html>
<head>
<title>System Scan</title>

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  text-align: center;
  padding-top: 100px;
}

#progress {
  width: 80%;
  margin: 20px auto;
  background: #111;
  border: 1px solid lime;
}

#bar {
  width: 0%;
  height: 20px;
  background: lime;
}
</style>
</head>

<body onclick="startPrank()">

<h1>🔍 Tap to Start Scan</h1>
<p id="status">Waiting...</p>

<div id="progress">
  <div id="bar"></div>
</div>

<audio id="alarm" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
function startPrank(){

  document.body.onclick = null;

  // fullscreen
  document.documentElement.requestFullscreen();

  // sound start
  let audio = document.getElementById("alarm");
  audio.play();

  // vibration
  if (navigator.vibrate) {
    navigator.vibrate([300,100,300,100,500]);
  }

  document.querySelector("h1").innerText = "🔍 System Scan Starting...";
  document.getElementById("status").innerText = "Initializing...";

  let width = 0;
  let bar = document.getElementById("bar");
  let status = document.getElementById("status");

  let steps = [
    "Connecting...",
    "Scanning device...",
    "Accessing files...",
    "Uploading data...",
    "Finalizing..."
  ];

  let i = 0;

  let interval = setInterval(() => {
    if (width >= 100) {
      clearInterval(interval);

      document.body.innerHTML = `
        <h1 style="color:red;">⚠️ PHONE HACKED ⚠️</h1>
        <p style="color:lime;">Your data is being transferred...</p>
      `;

      setTimeout(() => {
        document.body.innerHTML += `
          <p style="color:lime;">Hack by Sofior 😈</p>
        `;
      }, 2000);

      setTimeout(() => {
        document.body.innerHTML += `
          <p style="color:lime;">Just Kidding 😂</p>
          <p style="color:lime;">APRIL FOOL 😜</p>

          <br><br>

          <video id="vid" width="90%" autoplay muted playsinline>
            <source src="VID_20260401_104517_662.mp4" type="video/mp4">
          </video>
        `;

        // autoplay with sound
        let v = document.getElementById("vid");
        v.muted = false;
        v.play();

      }, 5000);

    } else {
      width++;
      bar.style.width = width + "%";

      if (width % 20 === 0 && i < steps.length) {
        status.innerText = steps[i];
        i++;
      }
    }
  }, 80);
}
</script>

</body>
</html>
