<!DOCTYPE html>
<html>
<head>
<title>System Scan</title>

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  text-align: center;
  padding-top: 100px;
}

#progress {
  width: 80%;
  margin: 20px auto;
  background: #111;
  border: 1px solid lime;
}

#bar {
  width: 0%;
  height: 20px;
  background: lime;
}

h1 {
  font-size: 28px;
}
</style>
</head>

<body onclick="startFull()">

<h1>🔍 System Scan Starting...</h1>
<p id="status">Initializing...</p>

<div id="progress">
  <div id="bar"></div>
</div>

<script>
function startFull(){
  document.documentElement.requestFullscreen();
}

let width = 0;
let bar = document.getElementById("bar");
let status = document.getElementById("status");

let steps = [
  "Initializing system...",
  "Connecting to server...",
  "Scanning device storage...",
  "Accessing private files...",
  "Uploading data...",
  "Finalizing breach..."
];

let i = 0;

let interval = setInterval(() => {
  if (width >= 100) {
    clearInterval(interval);

    // vibration
    if (navigator.vibrate) {
      navigator.vibrate([300,100,300,100,500]);
    }

    // hacked screen
    document.body.innerHTML = `
      <h1 style="color:red;">⚠️ PHONE HACKED ⚠️</h1>
      <p style="color:lime; font-size:22px;">Your data is being transferred...</p>
    `;

    // delay reveal (strong prank 😈)
    setTimeout(() => {
      document.body.innerHTML += `
        <p style="color:lime; font-size:22px;">Hack by Sofior 😈</p>
      `;
    }, 2000);

    setTimeout(() => {
      document.body.innerHTML += `
        <p style="color:lime; font-size:22px;">Just Kidding 😂</p>
        <p style="color:lime; font-size:24px;">APRIL FOOL 😜</p>
      `;
    }, 5000);

  } else {
    width++;
    bar.style.width = width + "%";

    if (width % 15 === 0 && i < steps.length) {
      status.innerHTML = steps[i];
      i++;
    }
  }
}, 80);
</script>

</body>
</html>
